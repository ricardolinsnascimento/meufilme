		<figure>
			<img id="Tom" src="img/Tom.JPG" alt="Tom Hardy">
			<figcaption>
				<p> Tom Hardy </p>
				<p> Eddie Brock </p>
				<p> <strong>Edward Thomas "Tom" Hardy</strong> é um ator, produtor e roteirista britânico conhecido pelos seus papéis em filmes como Inception, The Dark Knight Rises, Mad Max: Fury Road e Venom e também na série Peaky Blinders. Em 2016 foi indicado ao Óscar de melhor ator secundário pelo filme The Revenant. </p>
				<p> Nascimento: 15 de setembro de 1977 (idade 44 anos), Hammersmith, Londres, Reino Unido </p>	
			</figcaption>
			<img id="Michelle" src="img/Michelle.JPG" alt="Michelle Williams">
			<figcaption>
				<p> Michelle Williams </p>
				<p> Anne Weying </p>
				<p> <strong>Michelle Ingrid Williams</strong> é uma atriz norte-americana, vencedora de dois Globos de Ouro, um Emmy e um SAG, recebeu quatro indicações ao Oscar, três ao BAFTA e uma ao Tony. Williams começou a carreira ainda criança e estreou no cinema no filme Lassie. </p>
				<p> Nascimento: 9 de setembro de 1980 (idade 41 anos), Kalispell, Montana, EUA </p>
			</figcaption>
			<img id="Riz" src="img/Riz.JPG" alt="Riz Ahmed">
			<figcaption>
				<p> Riz Ahmed </p>
				<p> Carlton Drake </p>
				<p> <strong>Rizwan Ahmed </strong> , também conhecido como Riz MC, é um ator, musicista e ativista inglês. Ele já venceu o Óscar da Academia, Emmy do Primetime, National Board of Review, Prêmio Independent Spirit, London Film Critics' Circle e dois British Independent Film Awards; ele também recebeu indicações para dois Óscar da Academia, dois Prêmios Globo de Ouro, dois Prémios Emmy, dois Prêmios Screen Actors Guild e dois Prêmios BAFTA.</p>
				<p>  1 de dezembro de 1982 (idade 39 anos), Wembley, Reino Unido </p>	
			</figcaption>
			<img id="Woddy" src="img/Woody.JPG" alt="Woody Harrelson">
			<figcaption>
				<p> Woddy Harrelson </p>
				<p> Cletus Kasady </p>
				<p> <strong>Woodrow Tracy Harrelson</strong> , é um ator norte-americano. Foi indicado ao Oscar três vezes, 1996, 2010 e 2017. É filho de Diane Lou e Charles Harrelson, um assassino profissional, Woody Harrelson é defensor da legalização do uso da maconha e é militante em causas ecológicas, apoiando o grupo ambientalista Ruckus Society. </p>
				<p> Nascimento: 23 de julho de 1961 (idade 60 anos), Midland, Texas, EUA </p>
			</figcaption>
			<img id="Jenny" src="img/Jenny.JPG" alt="Jenny Slate">
			<figcaption>
				<p> Jenny Slate </p>
				<p> Dora Skirth </p>
				<p> <strong> Jenny Sarah Slate</strong>, é uma comediante, atriz e autora americana, mais conhecida por interpretar Donna Stern na comédia dramática da A24 Obvious Child, pela qual venceu o Critics Choice Award de melhor atriz num filme de comédia, Dora Skirth na adaptação de Venom (2018) para o cinema, e Mona-Lisa Saperstein, na série de comédia da NBC Parks and Recreation.</p>
				<p> Nascimento: 25 de março de 1982 (idade 40 anos), Milton, Massachusetts, EUA </p>	
			</figcaption>
