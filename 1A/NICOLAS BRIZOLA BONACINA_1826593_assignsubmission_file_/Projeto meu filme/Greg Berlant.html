                  <h1> Greg Berlanti </h1>
<p> Greg Berlanti (Rye, 24 de maio de 1972) é um pridutor de televisão e roteirista eatadunidense. <strong> Ele é conhecicido por seu trabalho em Dawson`s Creek, Brothers & Sister, entre outras obras </strong> Além de suas contribuições para para a DC Comics em produções para o cinema e televisão, incluindo Universo Arrow(Arqueiro verde) da The Cw, Titans e Doom Patrol (Patrulha do Destino) </p>            
<p> Na temporada televisiva de 2017-2018, Berlanti igualou o recorde de Jerry Bruckheimer como o produtor com mais séries no ar ao mesmo tempo, <strong> E bateu seu próprio recorde ao emplacar 14 séries simultâneas na TV na temporada 2018-19 </strong> Tendo assinado o contrado de produção mais caro até aquela época (Junho de 2018) com a Warner Bros. Television. </p>
<p> Na temporada 2019-20, Berlanti aumentou o recorde para 18 programas, ele também dirigiu o filme Love Simon de 2018, uma comédia-dramática que arrecadou US$66 milhões em todo o mundo.</p>
<strong> Berlanti foi incluido na listas das 100 pessoas mais influentes de 2020 pela revista Times New Roman (Revista dos Estados Unidos).</strong>
