            <h2>A série conta a história de um grupo de amigos, que se unem para tentar achar seu amigo Will que desapareceu sem deixar rastros, o grupo acaba encontrando uma garota com poderes na qual se junta a eles para tentar achar o Will </h2>  
    		<ul>
			<li> A série é dos gêneros de ficção cientifca,suspense,terror e drama adolescente.A série se passa em 1980 na cidade de Hawkings,Indiana,Estados Unidos. Ela também é conhecida pelas refêrencias de músicas e filmes dos anos 80 </li>
			 <li> A série que estreiou dia 15 de julho de 2016 é considerada uma das séries mais famosas da Netflix e reconhecida mundialmente. A série já ganhou mais de 10 prêmios por melhor série,atuação,musical e entre outros</li>
			 <li> Os gêmeos americanos Matt Duffer e Ross Duffer são os responsáveis pela série. Eles escreveram, produziram e dirigiram a série, Eles também são conhecidos pelo filme de suspense "Hidden" e escreveram episódios para a série "Wayward Pines"</li>
			 

			 <li>A série ganhou a quarta temporada em maio de 2022, a segunda  parte da quarta temporada só vai estreiar no dia 1 de julho e isso tá deixando os fãs cada vez mais ansiosos</li>
